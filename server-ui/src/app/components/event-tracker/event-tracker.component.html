
<div class=" container-fluid event-tracker-container">
    <h1 class="event-tracker-header">{{eventTableHeader}}</h1>
    <table mat-table [dataSource]="events" id="event-table-container">
        <!-- Date Column -->
        <ng-container matColumnDef="event_date" >
        <th mat-header-cell *matHeaderCellDef> {{dateColumnHeader}} </th>
        <td mat-cell *matCellDef="let element"> {{element.event_date}}/{{element.event_month}} </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="event_name">
        <th mat-header-cell *matHeaderCellDef> {{nameColumnHeader}} </th>
        <td mat-cell *matCellDef="let element"> {{element.event_name}} </td>
        </ng-container>

        <!-- Delete Column -->
        <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef> 
            <button mat-icon-button color="primary" (click)="addUserDialog()">
            <mat-icon>person_add</mat-icon>
            </button>
        </th>
        <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="deleteEvent(element.event_id)" >
            <mat-icon>delete_forever</mat-icon>
            </button>
        </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
