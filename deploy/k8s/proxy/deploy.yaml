apiVersion: apps/v1
kind: Deployment

metadata:
  name: proxy

spec:
  replicas: 1

  selector:
    matchLabels:
      app: proxy

  template:
    metadata:
      labels:
        app: proxy

    spec:
      containers:
        - name: nginx
          image: docker.io/nginx:1.28-alpine

          ports:
            - containerPort: 80
            - containerPort: 443

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
